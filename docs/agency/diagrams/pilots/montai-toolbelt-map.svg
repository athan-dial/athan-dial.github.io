<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 280" width="920" height="280" role="img" aria-labelledby="title desc">
  <title id="title">Systems-of-record toolbelt</title>
  <desc id="desc">Six systems: data lake, app read replica, wiki memory, issue tracking, report host, orchestration control plane, connected left to right.</desc>
  <rect width="100%" height="100%" fill="#0A0E1A"/>
  <text x="24" y="36" fill="#EEEEF4" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="600">Systems-of-record toolbelt</text>
  <text x="24" y="56" fill="#A0A0B0" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Which system owns truth for which class of builder question?</text>
  <!-- nodes -->
  <g font-family="Segoe UI, system-ui, sans-serif" font-size="11" text-anchor="middle">
    <rect x="20" y="88" width="130" height="56" rx="4" fill="#1B134D" stroke="#7dd3fc" stroke-width="2"/>
    <text x="85" y="122" fill="#EEEEF4">Lake (Athena)</text>
    <rect x="170" y="88" width="130" height="56" rx="4" fill="#1B134D" stroke="#1AA684" stroke-width="2"/>
    <text x="235" y="122" fill="#EEEEF4">App (replica)</text>
    <rect x="320" y="88" width="130" height="56" rx="4" fill="#1B134D" stroke="#1AA684" stroke-width="2"/>
    <text x="385" y="122" fill="#EEEEF4">Memory (wiki)</text>
    <rect x="470" y="88" width="130" height="56" rx="4" fill="#1B134D" stroke="#1AA684" stroke-width="2"/>
    <text x="535" y="122" fill="#EEEEF4">Tracking (issues)</text>
    <rect x="620" y="88" width="130" height="56" rx="4" fill="#1B134D" stroke="#1AA684" stroke-width="2"/>
    <text x="685" y="122" fill="#EEEEF4">Ship (reports)</text>
    <rect x="770" y="88" width="130" height="56" rx="4" fill="#7dd3fc" stroke="#0ea5e9" stroke-width="2"/>
    <text x="835" y="122" fill="#0E0E12">Orchestration</text>
  </g>
  <!-- arrows -->
  <g stroke="#585864" stroke-width="2" fill="none" marker-end="url(#arr)">
    <line x1="150" y1="116" x2="168" y2="116"/>
    <line x1="300" y1="116" x2="318" y2="116"/>
    <line x1="450" y1="116" x2="468" y2="116"/>
    <line x1="600" y1="116" x2="618" y2="116"/>
    <line x1="750" y1="116" x2="768" y2="116"/>
  </g>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#585864"/>
    </marker>
  </defs>
  <text x="24" y="200" fill="#888898" font-family="Segoe UI, system-ui, sans-serif" font-size="10">v1 pilot — replace with draw.io export when template is locked</text>
</svg>
