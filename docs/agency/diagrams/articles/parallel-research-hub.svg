<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 650" width="960" height="650">
  <defs>
    <style type="text/css"><![CDATA[
    ]]></style>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="shadow-sm" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="960" height="650" fill="#0A0E1A"/>

  <!-- Title -->
  <text x="60" y="60" fill="#7dd3fc" font-family="JetBrains Mono, monospace" font-weight="600" font-size="24">Parallel research with subagents</text>
  <text x="60" y="92" fill="#94a3b8" font-family="Manrope, sans-serif" font-weight="400" font-size="13">Ask once, search in parallel, read the merged brief</text>

  <!-- Side badge -->
  <rect x="720" y="120" width="220" height="56" rx="10" ry="10" fill="#1e293b" stroke="#64748b" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="735" y="154" fill="#94a3b8" font-family="Manrope, sans-serif" font-weight="600" font-size="12">Follow-up depth pass</text>

  <!-- Nodes -->
  <!-- Spokes: clean cross around hub -->
  <rect x="140" y="150" width="270" height="72" rx="10" ry="10" fill="#1AA684" filter="url(#shadow)"/>
  <text x="155" y="194" fill="#ffffff" font-family="JetBrains Mono, monospace" font-weight="600" font-size="15">Academic database agent</text>

  <rect x="550" y="150" width="270" height="72" rx="10" ry="10" fill="#22a86e" filter="url(#shadow)"/>
  <text x="565" y="194" fill="#ffffff" font-family="JetBrains Mono, monospace" font-weight="600" font-size="15">Preprint agent</text>

  <rect x="140" y="340" width="270" height="72" rx="10" ry="10" fill="#3cb856" filter="url(#shadow)"/>
  <text x="155" y="384" fill="#ffffff" font-family="JetBrains Mono, monospace" font-weight="600" font-size="15">Trials/registry agent</text>

  <rect x="550" y="340" width="270" height="72" rx="10" ry="10" fill="#7ab830" filter="url(#shadow)"/>
  <text x="565" y="384" fill="#ffffff" font-family="JetBrains Mono, monospace" font-weight="600" font-size="15">Web/news agent</text>

  <!-- Hub -->
  <rect x="300" y="210" width="360" height="80" rx="10" ry="10" fill="#7dd3fc" filter="url(#shadow)"/>
  <text x="480" y="250" fill="#0A0E1A" font-family="JetBrains Mono, monospace" font-weight="600" font-size="15" text-anchor="middle" dominant-baseline="middle">Scoped research question</text>

  <!-- Synthesis -->
  <rect x="320" y="530" width="320" height="72" rx="10" ry="10" fill="#c4b820" filter="url(#shadow)"/>
  <text x="480" y="566" fill="#0A0E1A" font-family="JetBrains Mono, monospace" font-weight="600" font-size="15" text-anchor="middle" dominant-baseline="middle">Synthesis + conflicts</text>

  <!-- Arrows: dispatch from hub to spokes (line + polygon only) -->
  <line x1="480" y1="250" x2="418" y2="192" stroke="#1AA684" stroke-width="2"/>
  <polygon points="410,186 424,190 416,202" fill="#1AA684"/>

  <line x1="480" y1="250" x2="542" y2="192" stroke="#22a86e" stroke-width="2"/>
  <polygon points="550,186 536,190 544,202" fill="#22a86e"/>

  <line x1="480" y1="250" x2="420" y2="370" stroke="#3cb856" stroke-width="2"/>
  <polygon points="410,376 422,372 418,360" fill="#3cb856"/>

  <line x1="480" y1="250" x2="540" y2="370" stroke="#7ab830" stroke-width="2"/>
  <polygon points="550,376 538,372 542,360" fill="#7ab830"/>

  <!-- Arrows: spokes reconverge to synthesis -->
  <line x1="275" y1="222" x2="390" y2="520" stroke="#c4b820" stroke-width="2"/>
  <polygon points="390,530 384,520 396,520" fill="#c4b820"/>

  <line x1="685" y1="222" x2="570" y2="520" stroke="#c4b820" stroke-width="2"/>
  <polygon points="570,530 564,520 576,520" fill="#c4b820"/>

  <line x1="275" y1="412" x2="450" y2="520" stroke="#c4b820" stroke-width="2"/>
  <polygon points="450,530 444,520 456,520" fill="#c4b820"/>

  <line x1="685" y1="412" x2="510" y2="520" stroke="#c4b820" stroke-width="2"/>
  <polygon points="510,530 504,520 516,520" fill="#c4b820"/>
</svg>
