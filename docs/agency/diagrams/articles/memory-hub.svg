<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
    </style>

    <!-- Filters -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
    <filter id="shadow-sm" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="600" fill="#0A0E1A"/>

  <!-- Title -->
  <text x="400" y="56" text-anchor="middle" fill="#7dd3fc" font-family="JetBrains Mono, monospace" font-weight="600" font-size="24">Memory across sessions</text>
  <text x="400" y="80" text-anchor="middle" fill="#64748b" font-family="Manrope, sans-serif" font-weight="300" font-size="13">One store &#8594; many persistent behaviors</text>

  <!-- Spoke nodes -->
  <!-- Spoke 1 (top) -->
  <rect x="290" y="120" width="220" height="90" rx="10" ry="10" fill="#1AA684" filter="url(#shadow)"/>
  <text x="400" y="154" text-anchor="middle" fill="#ffffff" font-family="JetBrains Mono, monospace" font-weight="600" font-size="15">No restating decisions</text>
  <text x="400" y="178" text-anchor="middle" fill="#ffffff" opacity="0.88" font-family="Manrope, sans-serif" font-weight="400" font-size="12">naming, branch, guardrails</text>

  <!-- Spoke 2 (right) -->
  <rect x="560" y="275" width="220" height="90" rx="10" ry="10" fill="#22a86e" filter="url(#shadow)"/>
  <text x="670" y="309" text-anchor="middle" fill="#ffffff" font-family="JetBrains Mono, monospace" font-weight="600" font-size="15">Feedback compounds</text>
  <text x="670" y="333" text-anchor="middle" fill="#ffffff" opacity="0.88" font-family="Manrope, sans-serif" font-weight="400" font-size="12">tone fixes, command safety</text>

  <!-- Spoke 3 (bottom) -->
  <rect x="290" y="450" width="220" height="90" rx="10" ry="10" fill="#3cb856" filter="url(#shadow)"/>
  <text x="400" y="484" text-anchor="middle" fill="#ffffff" font-family="JetBrains Mono, monospace" font-weight="600" font-size="15">Context survives handoffs</text>
  <text x="400" y="508" text-anchor="middle" fill="#ffffff" opacity="0.88" font-family="Manrope, sans-serif" font-weight="400" font-size="12">between devices, tools</text>

  <!-- Spoke 4 (left) -->
  <rect x="20" y="275" width="220" height="90" rx="10" ry="10" fill="#7ab830" filter="url(#shadow)"/>
  <text x="130" y="309" text-anchor="middle" fill="#ffffff" font-family="JetBrains Mono, monospace" font-weight="600" font-size="15">Guardrails stay visible</text>
  <text x="130" y="333" text-anchor="middle" fill="#ffffff" opacity="0.88" font-family="Manrope, sans-serif" font-weight="400" font-size="12">never touch prod, run verify</text>

  <!-- Central hub -->
  <rect x="270" y="260" width="260" height="120" rx="12" ry="12" fill="#7dd3fc" filter="url(#shadow)"/>
  <text x="400" y="306" text-anchor="middle" fill="#0A0E1A" font-family="JetBrains Mono, monospace" font-weight="700" font-size="16">Shared memory store</text>
  <text x="400" y="332" text-anchor="middle" fill="#0A0E1A" opacity="0.78" font-family="JetBrains Mono, monospace" font-weight="500" font-size="11">/remember, /reflect, /knowledge</text>
  <text x="400" y="358" text-anchor="middle" fill="#0A0E1A" opacity="0.70" font-family="Manrope, sans-serif" font-weight="400" font-size="11">Durable state, reused on every turn</text>

  <!-- Connectors (hub &#8594; spokes) -->
  <!-- To top (No restating decisions) -->
  <line x1="400" y1="252" x2="400" y2="228" stroke="#1AA684" stroke-width="2"/>
  <polygon points="400,218 394,228 406,228" fill="#1AA684"/>

  <!-- To right (Feedback compounds) -->
  <line x1="530" y1="320" x2="542" y2="320" stroke="#22a86e" stroke-width="2"/>
  <polygon points="552,320 542,314 542,326" fill="#22a86e"/>

  <!-- To bottom (Context survives handoffs) -->
  <line x1="400" y1="388" x2="400" y2="432" stroke="#3cb856" stroke-width="2"/>
  <polygon points="400,442 394,432 406,432" fill="#3cb856"/>

  <!-- To left (Guardrails stay visible) -->
  <line x1="270" y1="320" x2="252" y2="320" stroke="#7ab830" stroke-width="2"/>
  <polygon points="248,320 258,314 258,326" fill="#7ab830"/>

  <!-- Small labels -->
</svg>
