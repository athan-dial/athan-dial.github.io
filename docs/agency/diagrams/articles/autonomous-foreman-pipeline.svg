<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" width="960" height="520">
  <defs>
    <style>
    </style>

    <!-- Shadows -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
    <filter id="shadow-sm" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="960" height="520" fill="#0A0E1A"/>

  <!-- Title -->
  <text x="40" y="58" fill="#7dd3fc" font-family="JetBrains Mono, monospace" font-size="24" font-weight="600">
    Autonomous agents need a foreman
  </text>
  <text x="40" y="82" fill="#94a3b8" font-family="Manrope, sans-serif" font-size="13" font-weight="300">
    Discuss ? Plan ? Execute ? Verify, with governance across every step
  </text>

  <!-- Oversight rail -->
  <line x1="160" y1="140" x2="940" y2="140" stroke="#7dd3fc" stroke-width="2" stroke-dasharray="8 8" opacity="0.95"/>
  <text x="160" y="124" fill="#7dd3fc" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500">
    Foreman orchestration
  </text>

  <!-- Rail connectors -->
  <line x1="250" y1="140" x2="250" y2="178" stroke="#7dd3fc" stroke-width="2" opacity="0.45" stroke-dasharray="6 8"/>
  <line x1="450" y1="140" x2="450" y2="178" stroke="#7dd3fc" stroke-width="2" opacity="0.45" stroke-dasharray="6 8"/>
  <line x1="650" y1="140" x2="650" y2="178" stroke="#7dd3fc" stroke-width="2" opacity="0.45" stroke-dasharray="6 8"/>
  <line x1="850" y1="140" x2="850" y2="178" stroke="#7dd3fc" stroke-width="2" opacity="0.45" stroke-dasharray="6 8"/>

  <!-- Entry badge -->
  <rect x="20" y="190" width="120" height="104" rx="8" ry="8" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="35" y="242" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">
    ENTRY
  </text>
  <text x="35" y="264" fill="#ffffff" font-family="Manrope, sans-serif" font-size="11" font-weight="400" opacity="0.90">
    Surface assumptions
  </text>

  <!-- Pipeline nodes -->
  <rect x="160" y="190" width="180" height="126" rx="10" ry="10" fill="#1AA684" stroke="#0f6b52" stroke-width="2" filter="url(#shadow)"/>
  <text x="175" y="242" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="15" font-weight="600">
    Discuss
  </text>
  <text x="175" y="264" fill="#ffffff" font-family="Manrope, sans-serif" font-size="11" font-weight="400" opacity="0.92">
    Surface assumptions
  </text>
  <text x="175" y="286" fill="#ffffff" font-family="Manrope, sans-serif" font-size="11" font-weight="400" opacity="0.92">
    Answer questions
  </text>

  <rect x="360" y="190" width="180" height="126" rx="10" ry="10" fill="#22a86e" stroke="#1a7a52" stroke-width="2" filter="url(#shadow)"/>
  <text x="375" y="242" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="15" font-weight="600">
    Plan
  </text>
  <text x="375" y="264" fill="#ffffff" font-family="Manrope, sans-serif" font-size="11" font-weight="400" opacity="0.92">
    Tasks + dependencies
  </text>
  <text x="375" y="286" fill="#ffffff" font-family="Manrope, sans-serif" font-size="11" font-weight="400" opacity="0.92">
    Acceptance criteria
  </text>

  <rect x="560" y="190" width="180" height="126" rx="10" ry="10" fill="#3cb856" stroke="#2d8040" stroke-width="2" filter="url(#shadow)"/>
  <text x="575" y="242" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="15" font-weight="600">
    Execute
  </text>
  <text x="575" y="264" fill="#ffffff" font-family="Manrope, sans-serif" font-size="11" font-weight="400" opacity="0.92">
    Do the work
  </text>
  <text x="575" y="286" fill="#ffffff" font-family="Manrope, sans-serif" font-size="11" font-weight="400" opacity="0.92">
    Atomic commits
  </text>

  <rect x="760" y="190" width="180" height="126" rx="10" ry="10" fill="#7ab830" stroke="#5a8a20" stroke-width="2" filter="url(#shadow)"/>
  <text x="775" y="242" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="15" font-weight="600">
    Verify
  </text>
  <text x="775" y="264" fill="#ffffff" font-family="Manrope, sans-serif" font-size="11" font-weight="400" opacity="0.92">
    Compare to plan
  </text>
  <text x="775" y="286" fill="#ffffff" font-family="Manrope, sans-serif" font-size="11" font-weight="400" opacity="0.92">
    Gate to advance
  </text>

  <!-- Arrows -->
  <line x1="140" y1="253" x2="150" y2="253" stroke="#1AA684" stroke-width="2"/>
  <polygon points="160,253 150,247 150,259" fill="#1AA684"/>

  <line x1="340" y1="253" x2="350" y2="253" stroke="#22a86e" stroke-width="2"/>
  <polygon points="360,253 350,247 350,259" fill="#22a86e"/>

  <line x1="540" y1="253" x2="550" y2="253" stroke="#3cb856" stroke-width="2"/>
  <polygon points="560,253 550,247 550,259" fill="#3cb856"/>

  <line x1="740" y1="253" x2="750" y2="253" stroke="#7ab830" stroke-width="2"/>
  <polygon points="760,253 750,247 750,259" fill="#7ab830"/>

  <!-- Autonomy slider inset -->
  <rect x="520" y="352" width="420" height="126" rx="8" ry="8" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="535" y="404" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">
    Autonomy slider
  </text>
  <text x="535" y="426" fill="#94a3b8" font-family="Manrope, sans-serif" font-size="11" font-weight="400" opacity="0.95">
    Guided / Quick / Autonomous
  </text>
  <text x="535" y="448" fill="#94a3b8" font-family="Manrope, sans-serif" font-size="11" font-weight="400" opacity="0.95">
    More autonomy = fewer checkpoints
  </text>

  <!-- Slider track -->
  <line x1="545" y1="468" x2="915" y2="468" stroke="#334155" stroke-width="8" stroke-linecap="round" opacity="0.95"/>
  <line x1="545" y1="468" x2="675" y2="468" stroke="#1AA684" stroke-width="8" stroke-linecap="round" opacity="0.95"/>
  <line x1="675" y1="468" x2="795" y2="468" stroke="#3cb856" stroke-width="8" stroke-linecap="round" opacity="0.95"/>
  <line x1="795" y1="468" x2="915" y2="468" stroke="#7dd3fc" stroke-width="8" stroke-linecap="round" opacity="0.95"/>

  <!-- Slider stops -->
  <circle cx="675" cy="468" r="7" fill="#0A0E1A" stroke="#ffffff" stroke-width="2" opacity="0.95"/>
  <circle cx="795" cy="468" r="7" fill="#0A0E1A" stroke="#ffffff" stroke-width="2" opacity="0.95"/>
  <circle cx="915" cy="468" r="7" fill="#0A0E1A" stroke="#ffffff" stroke-width="2" opacity="0.95"/>

  <!-- Slider labels -->
  <text x="545" y="492" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500" opacity="0.92">
    Guided
  </text>
  <text x="740" y="492" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500" opacity="0.92">
    Quick
  </text>
  <text x="858" y="492" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" opacity="0.95">
    Autonomous
  </text>
</svg>
