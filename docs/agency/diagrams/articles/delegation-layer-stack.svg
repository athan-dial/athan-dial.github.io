<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 560" width="1060" height="560">
  <defs>
    <style>
    </style>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1060" height="560" fill="#0A0E1A"/>

  <!-- Title -->
  <text x="80" y="48" fill="#7dd3fc" font-family="JetBrains Mono, monospace" font-weight="600" font-size="24">Delegation is the real skill</text>
  <text x="80" y="72" fill="#94a3b8" font-family="Manrope, sans-serif" font-weight="300" font-size="13">Context, scope, and format stack to turn a prompt into real delegation</text>

  <!-- Top band: Format (y=100, h=120, bottom=220) -->
  <rect x="80" y="100" width="680" height="120" rx="10" ry="10" fill="#7dd3fc" stroke="#0ea5e9" stroke-width="2" filter="url(#shadow)"/>
  <text x="110" y="132" fill="#0A0E1A" font-family="JetBrains Mono, monospace" font-weight="600" font-size="15">Format that leaves no guesswork</text>
  <circle cx="112" cy="158" r="3" fill="#0A0E1A" opacity="0.85"/>
  <text x="124" y="162" fill="#0A0E1A" font-family="Manrope, sans-serif" font-weight="400" font-size="11">Deliverable form (SVG, PR, report)</text>
  <circle cx="112" cy="180" r="3" fill="#0A0E1A" opacity="0.85"/>
  <text x="124" y="184" fill="#0A0E1A" font-family="Manrope, sans-serif" font-weight="400" font-size="11">Commands to run + expected outputs</text>
  <circle cx="112" cy="202" r="3" fill="#0A0E1A" opacity="0.85"/>
  <text x="124" y="206" fill="#0A0E1A" font-family="Manrope, sans-serif" font-weight="400" font-size="11">Artifacts to attach (paths, screenshots)</text>

  <!-- Middle band: Scope (y=252, h=120, bottom=372) -->
  <rect x="80" y="252" width="680" height="120" rx="10" ry="10" fill="#3cb856" stroke="#2d8040" stroke-width="2" filter="url(#shadow)"/>
  <text x="110" y="284" fill="#ffffff" font-family="JetBrains Mono, monospace" font-weight="600" font-size="15">Scope that is legible</text>
  <circle cx="112" cy="310" r="3" fill="#ffffff" opacity="0.90"/>
  <text x="124" y="314" fill="#ffffff" font-family="Manrope, sans-serif" font-weight="400" font-size="11">Boundaries (in / out)</text>
  <circle cx="112" cy="332" r="3" fill="#ffffff" opacity="0.90"/>
  <text x="124" y="336" fill="#ffffff" font-family="Manrope, sans-serif" font-weight="400" font-size="11">Concrete files, functions, owners</text>
  <circle cx="112" cy="354" r="3" fill="#ffffff" opacity="0.90"/>
  <text x="124" y="358" fill="#ffffff" font-family="Manrope, sans-serif" font-weight="400" font-size="11">Definition of "done"</text>

  <!-- Bottom band: Context (y=404, h=120, bottom=524) -->
  <rect x="80" y="404" width="680" height="120" rx="10" ry="10" fill="#1AA684" stroke="#0f6b52" stroke-width="2" filter="url(#shadow)"/>
  <text x="110" y="436" fill="#ffffff" font-family="JetBrains Mono, monospace" font-weight="600" font-size="15">Context that orients</text>
  <circle cx="112" cy="462" r="3" fill="#ffffff" opacity="0.90"/>
  <text x="124" y="466" fill="#ffffff" font-family="Manrope, sans-serif" font-weight="400" font-size="11">Prior work</text>
  <circle cx="112" cy="484" r="3" fill="#ffffff" opacity="0.90"/>
  <text x="124" y="488" fill="#ffffff" font-family="Manrope, sans-serif" font-weight="400" font-size="11">Constraints</text>
  <circle cx="112" cy="506" r="3" fill="#ffffff" opacity="0.90"/>
  <text x="124" y="510" fill="#ffffff" font-family="Manrope, sans-serif" font-weight="400" font-size="11">History</text>

  <!-- Bracket -->
  <line x1="784" y1="100" x2="784" y2="524" stroke="#334155" stroke-width="2"/>
  <line x1="784" y1="100" x2="770" y2="100" stroke="#334155" stroke-width="2"/>
  <line x1="784" y1="524" x2="770" y2="524" stroke="#334155" stroke-width="2"/>

  <!-- Arrow from annotation to bracket -->
  <line x1="840" y1="310" x2="798" y2="310" stroke="#64748b" stroke-width="2"/>
  <polygon points="790,310 800,304 800,316" fill="#64748b"/>

  <!-- Annotation (inside viewBox now) -->
  <text x="850" y="300" fill="#64748b" font-family="JetBrains Mono, monospace" font-weight="500" font-size="11">Prompt = management</text>
  <text x="850" y="318" fill="#94a3b8" font-family="Manrope, sans-serif" font-weight="300" font-size="11">layer that holds the stack</text>
</svg>
