<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 650" width="960" height="650">
  <defs>
    <style>
    </style>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
    <filter id="shadow-sm" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="960" height="650" fill="#0A0E1A"/>

  <!-- Title -->
  <text x="40" y="52" fill="#7dd3fc" font-family="JetBrains Mono, monospace" font-size="24" font-weight="600">Build an ingest pipeline</text>

  <!-- Source cards -->
  <g>
    <rect x="40" y="70" width="160" height="82" rx="8" ry="8" fill="#1e293b" stroke="#0f6b52" stroke-width="2" filter="url(#shadow-sm)"/>
    <circle cx="66" cy="111" r="14" fill="#1AA684"/>
    <text x="92" y="116" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="15" font-weight="600">Slack channels</text>

    <rect x="220" y="70" width="160" height="82" rx="8" ry="8" fill="#1e293b" stroke="#1a7a52" stroke-width="2" filter="url(#shadow-sm)"/>
    <circle cx="246" cy="111" r="14" fill="#22a86e"/>
    <text x="272" y="116" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="15" font-weight="600">Confluence</text>

    <rect x="400" y="70" width="160" height="82" rx="8" ry="8" fill="#1e293b" stroke="#2d8040" stroke-width="2" filter="url(#shadow-sm)"/>
    <circle cx="426" cy="111" r="14" fill="#3cb856"/>
    <text x="452" y="116" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="15" font-weight="600">GoodLinks</text>

    <rect x="580" y="70" width="160" height="82" rx="8" ry="8" fill="#1e293b" stroke="#5a8a20" stroke-width="2" filter="url(#shadow-sm)"/>
    <circle cx="606" cy="111" r="14" fill="#7ab830"/>
    <text x="632" y="116" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="15" font-weight="600">Web / YouTube</text>

    <rect x="760" y="70" width="160" height="82" rx="8" ry="8" fill="#1e293b" stroke="#9a9010" stroke-width="2" filter="url(#shadow-sm)"/>
    <circle cx="786" cy="111" r="14" fill="#c4b820"/>
    <text x="812" y="116" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="15" font-weight="600">Outlook</text>
  </g>

  <!-- Ingest collectors row -->
  <g>
    <rect x="40" y="184" width="160" height="82" rx="10" ry="10" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
    <text x="55" y="232" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600">Slack collector</text>

    <rect x="220" y="184" width="160" height="82" rx="10" ry="10" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
    <text x="235" y="232" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600">Decisions coll.</text>

    <rect x="400" y="184" width="160" height="82" rx="10" ry="10" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
    <text x="415" y="232" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600">Bookmarks coll.</text>

    <rect x="580" y="184" width="160" height="82" rx="10" ry="10" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
    <text x="595" y="232" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600">Crawler coll.</text>

    <rect x="760" y="184" width="160" height="82" rx="10" ry="10" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
    <text x="775" y="232" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600">Mail collector</text>
  </g>

  <!-- Arrows: sources -> collectors -->
  <g>
    <line x1="120" y1="152" x2="120" y2="180" stroke="#64748b" stroke-width="2"/>
    <polygon points="120,184 114,174 126,174" fill="#64748b"/>

    <line x1="300" y1="152" x2="300" y2="180" stroke="#64748b" stroke-width="2"/>
    <polygon points="300,184 294,174 306,174" fill="#64748b"/>

    <line x1="480" y1="152" x2="480" y2="180" stroke="#64748b" stroke-width="2"/>
    <polygon points="480,184 474,174 486,174" fill="#64748b"/>

    <line x1="660" y1="152" x2="660" y2="180" stroke="#64748b" stroke-width="2"/>
    <polygon points="660,184 654,174 666,174" fill="#64748b"/>

    <line x1="840" y1="152" x2="840" y2="180" stroke="#64748b" stroke-width="2"/>
    <polygon points="840,184 834,174 846,174" fill="#64748b"/>
  </g>

  <!-- Funnel guides (wide -> narrow) -->
  <g>
    <line x1="40" y1="296" x2="120" y2="298" stroke="#334155" stroke-width="2" opacity="0.9"/>
    <line x1="920" y1="296" x2="840" y2="298" stroke="#334155" stroke-width="2" opacity="0.9"/>
    <line x1="120" y1="298" x2="170" y2="412" stroke="#334155" stroke-width="2" opacity="0.55"/>
    <line x1="840" y1="298" x2="790" y2="412" stroke="#334155" stroke-width="2" opacity="0.55"/>
    <line x1="170" y1="412" x2="240" y2="526" stroke="#334155" stroke-width="2" opacity="0.45"/>
    <line x1="790" y1="412" x2="720" y2="526" stroke="#334155" stroke-width="2" opacity="0.45"/>
  </g>

  <!-- Staging belt -->
  <g>
    <rect x="120" y="298" width="720" height="82" rx="10" ry="10" fill="#c4b820" stroke="#9a9010" stroke-width="2" filter="url(#shadow)"/>
    <text x="135" y="346" fill="#0A0E1A" font-family="JetBrains Mono, monospace" font-size="15" font-weight="600">Staging: atom schema + dedupe cache (idempotent)</text>
  </g>

  <!-- Arrow: collectors -> staging (single convergence) -->
  <g>
    <line x1="480" y1="266" x2="480" y2="294" stroke="#9a9010" stroke-width="2"/>
    <polygon points="480,298 474,288 486,288" fill="#9a9010"/>
  </g>

  <!-- Processing belt -->
  <g>
    <rect x="170" y="412" width="620" height="82" rx="10" ry="10" fill="#7ab830" stroke="#5a8a20" stroke-width="2" filter="url(#shadow)"/>
    <text x="185" y="460" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="15" font-weight="600">Processing: summaries, tags, cross-links</text>
  </g>

  <!-- Arrow: staging -> processing -->
  <g>
    <line x1="480" y1="380" x2="480" y2="408" stroke="#5a8a20" stroke-width="2"/>
    <polygon points="480,412 474,402 486,402" fill="#5a8a20"/>
  </g>

  <!-- Publish output (single) -->
  <g>
    <rect x="240" y="526" width="480" height="104" rx="10" ry="10" fill="#7dd3fc" stroke="#0ea5e9" stroke-width="2" filter="url(#shadow)"/>
    <text x="255" y="572" fill="#0A0E1A" font-family="JetBrains Mono, monospace" font-size="15" font-weight="600">Publish</text>
    <text x="255" y="594" fill="#0A0E1A" font-family="Manrope, sans-serif" font-size="13" font-weight="400">Hugo atoms folder &#8226; CSV feed &#8226; exporters (optional)</text>
  </g>

  <!-- Arrow: processing -> publish -->
  <g>
    <line x1="480" y1="494" x2="480" y2="522" stroke="#0ea5e9" stroke-width="2"/>
    <polygon points="480,526 474,516 486,516" fill="#0ea5e9"/>
  </g>

  <!-- Output note -->
  <text x="40" y="624" fill="#94a3b8" font-family="Manrope, sans-serif" font-size="11" font-weight="300" opacity="0.95">Multi-source capture converges into one idempotent ingest pipeline.</text>
</svg>
