name: Rebuild on skills update

on:
  repository_dispatch:
    types: [skills-updated]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.154.3"
          extended: true

      - name: Setup gh auth
        run: echo "GH_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Fetch skills
        run: bash scripts/fetch-skills.sh

      - name: Build site
        run: hugo --gc --minify

      - name: Sanity check plugin sites
        run: |
          echo "Slotted plugin sites:"
          find docs/skills -maxdepth 2 -name index.html -not -path '*/docs/*' | sort

      - name: Commit regenerated docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "site: rebuild from athan-dial/skills@$(echo $GITHUB_SHA | cut -c1-7) — $(find docs/skills -maxdepth 2 -name index.html -not -path '*/docs/*' | wc -l | tr -d ' ') plugin sites"
            git push
          fi
