{{ define "main" }}
<section class="section">
  <div class="container">
    <span class="section__label">Work Artifacts</span>
    <h2 class="section__heading">{{ .Title }}</h2>
    {{ if .Content }}
      <div class="prose" style="margin-bottom: var(--space-2xl);">
        {{ .Content }}
      </div>
    {{ end }}
    {{ if .Pages }}
      <div class="case-studies-grid">
        {{ range .Pages }}
          {{ partial "case-study-card.html" . }}
        {{ end }}
      </div>
    {{ end }}
  </div>
</section>
{{ end }}
