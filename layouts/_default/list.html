{{ define "main" }}
<div class="container">
  <h1>{{ .Title }}</h1>
  {{ if .Content }}
    <div class="prose">
      {{ .Content }}
    </div>
  {{ end }}
  {{ if .Pages }}
    <ul>
      {{ range .Pages }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
      {{ end }}
    </ul>
  {{ end }}
</div>
{{ end }}
