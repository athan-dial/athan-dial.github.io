{{/* Case Study Card — Harbor */}}
<article class="case-study-card">
  <a href="{{ .RelPermalink }}" class="case-study-card__link">
    <div>
      {{ with .Params.problem_type }}
        <div class="case-study-card__category">{{ replace . "-" " " }}</div>
      {{ end }}
      <h3 class="case-study-card__title">{{ .Title }}</h3>
    </div>
    <div>
      {{ if .Description }}
        <p class="case-study-card__excerpt">{{ .Description }}</p>
      {{ end }}
      <div class="case-study-card__footer">
        <div class="case-study-card__metadata">
          {{ with .Params.scope }}<span class="case-study-card__tag">{{ . }}</span>{{ end }}
          {{ with .Params.complexity }}<span class="case-study-card__tag">&middot; {{ . }}</span>{{ end }}
        </div>
        <span class="case-study-card__arrow">&rarr;</span>
      </div>
    </div>
  </a>
</article>
